name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master


jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.13"
    - run: make deps
    - run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        pytest: ["pytest>=8,<9", "pytest>=9,<10"]

    env:
      UV_EXTRA_ARGS: --with "${{ matrix.pytest }}"

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: astral-sh/setup-uv@v7
    - run: echo ${{ matrix.python }} > .python-version
    - run: make deps
    - run: make test
